apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin
  namespace: pediacare
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin
  template:
    metadata:
      labels:
        app: admin
    spec:
      containers:
        - name: admin
          image: pediacare/admin:latest
          env:
            - name: NEXT_PUBLIC_API_BASE_URL
              value: http://api:3000
          ports:
            - containerPort: 3002
---
apiVersion: v1
kind: Service
metadata:
  name: admin
  namespace: pediacare
spec:
  selector:
    app: admin
  ports:
    - port: 3002
      targetPort: 3002
