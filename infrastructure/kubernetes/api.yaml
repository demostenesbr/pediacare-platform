apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: pediacare
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: pediacare/api:latest
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: pediacare
spec:
  selector:
    app: api
  ports:
    - port: 3000
      targetPort: 3000
