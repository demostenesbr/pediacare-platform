services:
  api:
    build:
      context: ../../
      dockerfile: infrastructure/docker/Dockerfile.api
    environment:
      PORT: 3000
    ports:
      - "3000:3000"

  website:
    build:
      context: ../../
      dockerfile: infrastructure/docker/Dockerfile.website
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://api:3000
    depends_on:
      - api
    ports:
      - "3001:3001"

  admin:
    build:
      context: ../../
      dockerfile: infrastructure/docker/Dockerfile.admin
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://api:3000
    depends_on:
      - api
    ports:
      - "3002:3002"
